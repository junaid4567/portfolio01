<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Junaid | Software Engineer</title>
    <meta name="description" content="Professional profile and portfolio for Mohammad Junaid, Software Engineering student based in Karachi, Pakistan." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            --gold: rgb(193, 163, 98);
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: var(--font-sans);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: var(--font-display); }

        /* Grain Overlay */
        .grain::before {
            content: "";
            position: fixed;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
            animation: grain 8s steps(10) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            50% { transform: translate(-5%, -10%); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .expanding-grid { display: flex; transition: all 0.5s ease; }
        .project-pane {
            flex: 1; height: 100%; position: relative; overflow: hidden;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            border-right: 1px solid rgba(255,255,255,0.05);
            background: #080808; cursor: pointer;
        }
        .project-pane:hover { flex: 8; }

        @media (max-width: 768px) {
            .expanding-grid { flex-direction: column; height: auto; }
            .project-pane { height: 400px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        }

        .project-pane-img {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.1; transition: all 0.8s ease;
            filter: grayscale(1) brightness(0.4); transform: scale(1.1);
        }
        .project-pane:hover .project-pane-img { opacity: 0.6; filter: grayscale(0) brightness(0.6); transform: scale(1); }

        [data-reveal] { opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        [data-reveal].revealed { opacity: 1; transform: translateY(0); }

        .loader {
            position: fixed; inset: 0; background: #050505; z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: opacity 1s ease;
        }
    </style>
</head>
<body class="grain" x-data="{ 
    loading: true,
    menuOpen: false,
    submitted: false,
    activeCategory: 'All',
    navItems: [
        { name: 'Work', link: '#work' },
        { name: 'Philosophy', link: '#philosophy' },
        { name: 'Contact', link: '#contact' }
    ],
    categories: ['All', 'Academic', 'Systems', 'Motion'],
    projects: [
        { id: 1, title: 'Aptech Labs', cat: 'Academic', img: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80', desc: 'Core software engineering modules and computational logic studies.' },
        { id: 2, title: 'Ether Frame', cat: 'Systems', img: 'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80', desc: 'Developing robust logical frameworks for enterprise scalability.' },
        { id: 3, title: 'Neo Kinetic', cat: 'Motion', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80', desc: 'Exploration of dynamic interactions and fluid user experiences.' }
    ],
    get filtered() {
        return this.activeCategory === 'All' ? this.projects : this.projects.filter(p => p.cat === this.activeCategory);
    },
    scrollTo(id) {
        this.menuOpen = false;
        const el = document.querySelector(id);
        if(el) el.scrollIntoView({ behavior: 'smooth' });
    }
}" x-init="
    setTimeout(() => loading = false, 1500);
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('revealed') });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
">

    <div class="loader" :class="!loading && 'opacity-0 pointer-events-none'">
        <div class="flex flex-col items-center gap-6">
            <div class="w-12 h-12 border-2 border-transparent border-t-[#c1a362] rounded-full animate-spin"></div>
            <span class="text-[9px] uppercase tracking-[0.5em] text-[#c1a362] font-black">INITIALIZING</span>
        </div>
    </div>

    <header class="fixed top-0 w-full z-50 flex items-center justify-between px-5 py-4 lg:px-10 lg:py-6 mix-blend-difference">
        <a href="#" class="text-xl font-semibold tracking-tight text-white uppercase italic">velorix<sup class="text-[8px] font-normal ml-1 opacity-50 italic">Junaid</sup></a>
        <div class="hidden lg:flex items-center gap-1 rounded-full px-2 py-1.5 bg-[#0C0C0C]">
            <template x-for="item in navItems" :key="item.name">
                <a :href="item.link" @click.prevent="scrollTo(item.link)" class="text-white/80 hover:text-white text-sm px-4 py-1.5 rounded-full hover:bg-white/10 transition-all duration-200" x-text="item.name"></a>
            </template>
        </div>
        <button @click="scrollTo('#contact')" class="hidden lg:block text-sm font-medium px-5 py-2 rounded-full text-black bg-white hover:opacity-80 transition-all">Get in touch</button>
    </header>

    <main>
        <section class="relative w-full h-screen overflow-hidden bg-black flex flex-col items-center justify-center text-center px-5">
            <video class="absolute inset-0 z-0 w-full h-full object-cover opacity-60" 
                   src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260508_155101_f2540600-6fe9-433e-8e48-b3f4b72f0727.mp4" 
                   autoplay loop muted playsinline poster="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80"></video>
            
            <div class="relative z-10 pt-20">
                <h1 class="text-white font-normal leading-[1.12] tracking-tight max-w-3xl" style="font-size: clamp(1.75rem, 5vw, 2.6rem);">
                    Where precision finds its edge <br class="hidden sm:block" /> and vision rewrites what comes next
                </h1>
                <button @click="scrollTo('#work')" class="mt-8 flex items-center gap-2.5 px-6 py-3 mx-auto rounded-full text-black bg-white text-sm font-medium transition-all hover:opacity-80 group">
                    Watch it unfold <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </section>

        <section id="work" class="py-40 bg-black">
            <div class="px-8 md:px-20 mb-20 flex flex-col md:flex-row md:items-end justify-between gap-10">
                <div data-reveal>
                    <h2 class="text-6xl md:text-8xl font-normal tracking-tighter uppercase leading-[0.85]">Academic <br /><span class="text-white/20 italic font-display">Artifacts</span></h2>
                </div>
                <div class="flex flex-wrap gap-3" data-reveal>
                    <template x-for="cat in categories" :key="cat">
                        <button @click="activeCategory = cat" class="px-8 py-3 rounded-full text-[9px] uppercase tracking-[0.3em] font-black transition-all border"
                            :class="activeCategory === cat ? 'bg-[#c1a362] border-[#c1a362] text-black' : 'border-white/10 text-white hover:border-white'" x-text="cat"></button>
                    </template>
                </div>
            </div>
            <div class="expanding-grid h-[600px] md:h-[750px] border-t border-white/5" data-reveal>
                <template x-for="p in filtered" :key="p.id">
                    <div class="project-pane group">
                        <img :src="p.img" class="project-pane-img" loading="lazy">
                        <div class="absolute inset-0 p-12 flex flex-col justify-end bg-gradient-to-t from-black opacity-0 group-hover:opacity-100 transition-opacity">
                            <h3 class="text-4xl italic mb-4" x-text="p.title"></h3>
                            <p class="text-white/40 max-w-sm" x-text="p.desc"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section id="contact" class="py-40 bg-white text-black">
            <div class="max-w-7xl mx-auto px-8">
                <div class="grid md:grid-cols-2 gap-24" data-reveal>
                    <div>
                        <h2 class="text-7xl font-normal uppercase tracking-tighter mb-12">Let's <br />Connect</h2>
                        <div class="flex flex-col gap-8">
                            <a href="mailto:junaidoften1@gmail.com" class="text-2xl font-display border-b border-black pb-2 w-max">junaidoften1@gmail.com</a>
                            <div class="flex gap-8 text-[10px] uppercase tracking-[0.4em] font-black">
                                <a href="https://linkedin.com" target="_blank" rel="noopener" class="hover:opacity-50 transition-opacity">LinkedIn</a>
                                <a href="https://github.com" target="_blank" rel="noopener" class="hover:opacity-50 transition-opacity">GitHub</a>
                            </div>
                        </div>
                    </div>
                    <div class="bg-black/5 p-12 rounded-[2rem] relative">
                        <div x-show="submitted" class="absolute inset-0 bg-white z-20 flex flex-col justify-center items-center rounded-[2rem]">
                            <p class="text-2xl font-display italic">Message Sent.</p>
                            <button @click="submitted = false" class="mt-4 border-b border-black text-[9px] uppercase tracking-widest">Reset</button>
                        </div>
                        <form action="https://formspree.io/f/xykoyorz" method="POST" @submit.prevent="fetch($el.action, {method: 'POST', body: new FormData($el), headers: {'Accept': 'application/json'}}).then(r => {if(r.ok) submitted = true})">
                            <input type="text" name="name" placeholder="YOUR NAME" required class="w-full bg-transparent border-b border-black/10 py-4 outline-none mb-8">
                            <input type="email" name="email" placeholder="YOUR EMAIL" required class="w-full bg-transparent border-b border-black/10 py-4 outline-none mb-8">
                            <textarea name="message" placeholder="YOUR MESSAGE" required rows="3" class="w-full bg-transparent border-b border-black/10 py-4 outline-none mb-8 resize-none"></textarea>
                            <button type="submit" class="w-full bg-black text-white py-6 rounded-full text-[10px] uppercase font-black tracking-[0.5em]">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });
    </script>
</body>
</html>
